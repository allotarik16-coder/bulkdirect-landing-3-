<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BulkDirect III — Cyber Cyan Edition</title>
    <style>
        :root {
            --bg: #0b0f19;
            --accent: #00f2fe;

        body {
            background-color: var(--bg);
            color: var(--text);

        p { color: var(--muted); }
